name: Stellar CI Pipeline

permissions:
  contents: write

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
      
      - name: Add WebAssembly target
        run: rustup target add wasm32-unknown-unknown

      - name: Build Smart Contract
        working-directory: ./contract
        continue-on-error: true
        run: cargo build --target wasm32-unknown-unknown --release 2> build_error.txt
      
      - name: Dump build error
        if: always()
        run: cat ./contract/build_error.txt

      - name: Push build error
        if: always()
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add ./contract/build_error.txt
          git commit -m "Capture build error log" || echo "No changes"
          git push

      - name: Test Smart Contract
        working-directory: ./contract
        run: cargo test

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Frontend Dependencies
        working-directory: ./frontend
        run: npm install

      - name: Build Frontend
        working-directory: ./frontend
        run: npm run build
